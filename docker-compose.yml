services:
  meriri-web:
    container_name: meriri-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_YOCO_PUBLIC_KEY: ${NEXT_PUBLIC_YOCO_PUBLIC_KEY}
    image: meriri:latest
    restart: unless-stopped
    # ports:
    #   - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_YOCO_PUBLIC_KEY: ${NEXT_PUBLIC_YOCO_PUBLIC_KEY}
      YOCO_SECRET_KEY: ${YOCO_SECRET_KEY}
    networks:
      - meriri-network
networks:
  meriri-network:
    driver: bridge
